# Render Blueprint — https://render.com/docs/blueprint-spec
# Serves a PREBUILT static site: the `deploy` branch holds the compiled
# Vite output (index.html + assets/) at its root. Render does no install
# or build of its own — it just publishes those files from the CDN.
# Publish a new version with: ./scripts/deploy-to-render.sh
services:
  - type: web
    name: transformers-seminar
    runtime: static
    # Pull the prebuilt artifacts from the deploy branch, not main.
    branch: deploy
    # No build on Render's side — the deploy branch is already compiled.
    buildCommand: echo "Serving prebuilt output from the deploy branch"
    staticPublishPath: ./
    # Client-side routing: TanStack Router owns /m/$slug, so every path
    # must fall back to index.html instead of 404-ing on the server.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Vite fingerprints everything under /assets — safe to cache forever.
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
